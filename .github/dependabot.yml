version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: build
      include: scope
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
    groups:
      python-dependencies:
        patterns:
          - "*"
    ignore:
      # 0.137+ wraps included routers in _IncludedRouter, which breaks
      # starlette-prometheus (unmaintained — assumes route.path on every
      # matched route). Lift this once starlette-prometheus is replaced
      # or fixed upstream.
      - dependency-name: "fastapi"
        versions: [">=0.137.0"]
    commit-message:
      prefix: build
      include: scope
